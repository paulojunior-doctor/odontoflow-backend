version: '3.8'

services:

  # Evolution API — conecta o WhatsApp
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: 'true'
      # Webhook global — aponta para o nosso backend
      WEBHOOK_GLOBAL_URL: ${BACKEND_URL}/webhook/whatsapp
      WEBHOOK_GLOBAL_ENABLED: 'true'
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: 'true'
      WEBHOOK_EVENTS_MESSAGES_UPSERT: 'true'
      WEBHOOK_EVENTS_MESSAGES_UPDATE: 'true'
      WEBHOOK_EVENTS_CONNECTION_UPDATE: 'true'
      # Persistência
      DATABASE_ENABLED: 'true'
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: ${SUPABASE_URL}
      DATABASE_SAVE_DATA_INSTANCE: 'true'
      DATABASE_SAVE_DATA_NEW_MESSAGE: 'true'
      DATABASE_SAVE_MESSAGE_UPDATE: 'true'
      # Armazenamento de mídias
      S3_ENABLED: 'false'
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - odontoflow

  # Redis — fila de automações e follow-ups
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - odontoflow

  # Backend Node.js
  backend:
    build: .
    container_name: odontoflow_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
      - evolution-api
    networks:
      - odontoflow

volumes:
  evolution_data:
  redis_data:

networks:
  odontoflow:
    driver: bridge
